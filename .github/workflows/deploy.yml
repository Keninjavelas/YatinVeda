name: Deploy to Environments

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      rollback:
        description: 'Trigger production rollback'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    environment: staging
    permissions:
      packages: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Deploy to Staging
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            
            # Pull latest images
            docker pull ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:develop
            docker pull ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:develop
            
            # Snapshot current state for rollback
            docker compose -f docker-compose.staging.yml exec -T backend alembic current > /tmp/alembic-pre-deploy.txt 2>/dev/null || true
            
            # Stop existing containers
            docker compose -f docker-compose.staging.yml down
            
            # Update environment variables
            export DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}"
            export SECRET_KEY="${{ secrets.STAGING_SECRET_KEY }}"
            export REDIS_URL="${{ secrets.STAGING_REDIS_URL }}"
            export SMTP_SERVER="${{ secrets.STAGING_SMTP_SERVER }}"
            export SMTP_PORT="${{ secrets.STAGING_SMTP_PORT }}"
            export SMTP_USERNAME="${{ secrets.STAGING_SMTP_USERNAME }}"
            export SMTP_PASSWORD="${{ secrets.STAGING_SMTP_PASSWORD }}"
            export SMTP_FROM_EMAIL="${{ secrets.STAGING_SMTP_FROM_EMAIL }}"
            export OLLAMA_BASE_URL="${{ secrets.STAGING_OLLAMA_BASE_URL }}"
            
            # Start services with new images
            docker compose -f docker-compose.staging.yml up -d
            
            # Run database migrations
            docker compose -f docker-compose.staging.yml exec -T backend alembic upgrade head
            
            # Clean up old images
            docker image prune -f
          EOF

      - name: Run Health Check
        run: |
          for i in 1 2 3 4 5; do
            sleep 10
            if curl -sf ${{ secrets.STAGING_HEALTH_CHECK_URL }}; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying..."
          done
          echo "Health check failed after 5 attempts"
          exit 1

  deploy-production:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-alpha') && !contains(github.ref, '-beta'))
    environment: production
    permissions:
      packages: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Deploy to Production
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            
            # Snapshot for rollback — save current image tags
            docker compose -f docker-compose.prod.yml config --images > /tmp/pre-deploy-images.txt 2>/dev/null || true
            docker compose -f docker-compose.prod.yml exec -T backend alembic current > /tmp/alembic-pre-deploy.txt 2>/dev/null || true
            
            # Pull latest images tagged with the release version or main branch
            if [[ "${{ github.ref }}" == refs/tags/* ]]; then
              TAG=$(echo "${{ github.ref }}" | sed 's|refs/tags/||')
              docker pull ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG
              docker pull ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG
              
              sed -i "s|image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:$TAG|" docker-compose.prod.yml
              sed -i "s|image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:$TAG|" docker-compose.prod.yml
            else
              docker pull ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:main
              docker pull ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:main
            fi
            
            # Stop existing containers
            docker compose -f docker-compose.prod.yml down
            
            # Update environment variables
            export DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
            export SECRET_KEY="${{ secrets.PROD_SECRET_KEY }}"
            export REDIS_URL="${{ secrets.PROD_REDIS_URL }}"
            export SMTP_SERVER="${{ secrets.PROD_SMTP_SERVER }}"
            export SMTP_PORT="${{ secrets.PROD_SMTP_PORT }}"
            export SMTP_USERNAME="${{ secrets.PROD_SMTP_USERNAME }}"
            export SMTP_PASSWORD="${{ secrets.PROD_SMTP_PASSWORD }}"
            export SMTP_FROM_EMAIL="${{ secrets.PROD_SMTP_FROM_EMAIL }}"
            export OLLAMA_BASE_URL="${{ secrets.PROD_OLLAMA_BASE_URL }}"
            export COOKIE_SECURE="true"
            export ENABLE_HTTPS="true"
            
            # Start services with new images
            docker compose -f docker-compose.prod.yml up -d
            
            # Run database migrations
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            
            # Clean up old images
            docker image prune -f
          EOF

      - name: Production Health Check
        id: health_check
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 15
            if curl -sf ${{ secrets.PROD_HEALTH_CHECK_URL }}; then
              echo "Health check passed on attempt $i"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying..."
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Auto-Rollback on Failure
        if: failure() && steps.health_check.outputs.healthy == 'false'
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            echo "Health check failed — rolling back..."
            
            # Restore previous image tags
            if [ -f /tmp/pre-deploy-images.txt ]; then
              docker compose -f docker-compose.prod.yml down
              # Restart with the images that were already cached locally (previous version)
              docker compose -f docker-compose.prod.yml up -d
            fi
            
            # Rollback migration if snapshot exists
            if [ -f /tmp/alembic-pre-deploy.txt ]; then
              PREV_REV=$(cat /tmp/alembic-pre-deploy.txt | grep -oP '[a-f0-9]+' | head -1)
              if [ -n "$PREV_REV" ]; then
                docker compose -f docker-compose.prod.yml exec -T backend alembic downgrade "$PREV_REV" || true
              fi
            fi
          EOF

      - name: Notify Deployment Success
        if: success()
        run: |
          if [ -n "${{ secrets.DEPLOYMENT_WEBHOOK_URL }}" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"text\":\"✅ Production deployment successful: ${{ github.repository }} ${{ github.ref }}\"}" \
              "${{ secrets.DEPLOYMENT_WEBHOOK_URL }}"
          fi

      - name: Notify Deployment Failure
        if: failure()
        run: |
          if [ -n "${{ secrets.DEPLOYMENT_WEBHOOK_URL }}" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"text\":\"❌ Production deployment FAILED (auto-rollback triggered): ${{ github.repository }} ${{ github.ref }}\"}" \
              "${{ secrets.DEPLOYMENT_WEBHOOK_URL }}"
          fi

  rollback-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback == 'true'
    environment: production
    permissions:
      packages: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Rollback Production
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            echo "Manual rollback initiated..."
            
            # Stop current containers
            docker compose -f docker-compose.prod.yml down
            
            # Rollback DB migration one step
            docker compose -f docker-compose.prod.yml run --rm backend alembic downgrade -1 || true
            
            # Restart with locally cached previous images
            docker compose -f docker-compose.prod.yml up -d
            
            echo "Rollback complete. Verify health manually."
          EOF

      - name: Rollback Health Check
        run: |
          sleep 15
          curl -sf ${{ secrets.PROD_HEALTH_CHECK_URL }} || echo "WARNING: Health check failed after rollback — manual intervention required"