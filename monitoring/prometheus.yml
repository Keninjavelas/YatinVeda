# YatinVeda – Prometheus scrape configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "yatinveda"

rule_files:
  - "alerts.yml"

scrape_configs:
  # Backend FastAPI metrics
  - job_name: "yatinveda-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Redis metrics (via redis-exporter if added later)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # Synthetic HTTP probes via Blackbox Exporter
  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://backend:8000/
          - http://backend:8000/api/v1/health
          - http://backend:8000/api/v1/readiness
          - http://frontend:3000/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Health body validation probe
  - job_name: "blackbox-health-body"
    metrics_path: /probe
    params:
      module: [http_health_body]
    static_configs:
      - targets:
          - http://backend:8000/api/v1/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
