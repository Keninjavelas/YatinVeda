# YatinVeda – Prometheus scrape configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "yatinveda"

scrape_configs:
  # Backend FastAPI metrics
  - job_name: "yatinveda-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Redis metrics (via redis-exporter if added later)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
