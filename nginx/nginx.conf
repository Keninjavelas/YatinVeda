worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  server_tokens off;

  # ── Gzip compression ──────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             application/x-font-ttf font/opentype image/svg+xml;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_vary on;
  gzip_proxied any;

  # ── Rate limiting zones ───────────────────────────────────
  # General: 150 req/min per IP
  limit_req_zone $binary_remote_addr zone=general:20m rate=150r/m;
  # Login: 10 req/min per IP (strict)
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  # API: 200 req/min per IP
  limit_req_zone $binary_remote_addr zone=api:20m rate=200r/m;

  # ── Upstream servers with keepalive ───────────────────────
  upstream backend {
    server backend:8000;
    keepalive 32;
  }

  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  # ── Proxy timeouts ────────────────────────────────────────
  proxy_connect_timeout 10s;
  proxy_read_timeout    60s;
  proxy_send_timeout    60s;
  proxy_buffering       on;
  proxy_buffer_size     8k;
  proxy_buffers         16 8k;

  # ── HTTP → HTTPS redirect ─────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS server ──────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificates (dev: self-signed, prod: Let's Encrypt)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets – aggressive cache ─────────────────
    location /_next/static/ {
      proxy_pass http://frontend/_next/static/;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|webp)$ {
      proxy_pass http://frontend;
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ── Login – strict rate limit ──────────────────────────
    location = /api/v1/auth/login {
      proxy_pass http://backend/api/v1/auth/login;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      limit_req zone=login burst=5 nodelay;
      limit_req_status 429;
    }

    # ── Register – moderate rate limit ────────────────────
    location = /api/v1/auth/register {
      proxy_pass http://backend/api/v1/auth/register;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      limit_req zone=login burst=10 nodelay;
      limit_req_status 429;
    }

    # ── API routes → backend ──────────────────────────────
    location /api/ {
      proxy_pass http://backend/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port 443;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      limit_req zone=api burst=50 nodelay;
      limit_req_status 429;

      # Upload support
      client_max_body_size 20m;
    }

    # ── Uploaded files ─────────────────────────────────────
    location /uploads/ {
      proxy_pass http://backend/uploads/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
    }

    # ── Frontend (everything else) ─────────────────────────
    location / {
      proxy_pass http://frontend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      limit_req zone=general burst=50 nodelay;
      limit_req_status 429;
    }
  }
}
