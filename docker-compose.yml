# ============================================================
# YatinVeda – Production Docker Compose
# ============================================================
# Usage:
#   Default (app only):
#     docker compose up -d --build
#
#   With monitoring (Prometheus + Grafana):
#     docker compose --profile monitoring up -d --build
#
#   DB migrations run automatically in backend startup
# ============================================================

services:

  # ──────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yatinveda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yatinveda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-yatinveda}
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yatinveda} -d ${POSTGRES_DB:-yatinveda}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - yatinveda-net

  # ──────────────────────────────────────────
  # Redis – Session cache + Rate limiting
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yatinveda-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - yatinveda-net

  # ──────────────────────────────────────────
  # Backend – FastAPI
  # ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: yatinveda-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-yatinveda}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-yatinveda}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      # Application
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      REFRESH_TOKEN_BINDING: ${REFRESH_TOKEN_BINDING:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-strict}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://localhost}
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-sonnet-20240229}
      # Email
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@yatinveda.local}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      # Payments
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      # MFA
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
      # Monitoring
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CSRF_PROTECTION_ENABLED: ${CSRF_PROTECTION_ENABLED:-true}
      # DB Pool tuning for 500+ users
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      # Startup behavior
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      WAIT_FOR_DB: ${WAIT_FOR_DB:-true}
      DB_WAIT_MAX_ATTEMPTS: ${DB_WAIT_MAX_ATTEMPTS:-30}
      DB_WAIT_SLEEP_SECONDS: ${DB_WAIT_SLEEP_SECONDS:-2}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      UVICORN_LOG_LEVEL: ${UVICORN_LOG_LEVEL:-info}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/entrypoint.sh"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - yatinveda-net

  # ──────────────────────────────────────────
  # Frontend – Next.js
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yatinveda-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://localhost}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - yatinveda-net

  # ──────────────────────────────────────────
  # Nginx – Reverse Proxy (SSL termination)
  # ──────────────────────────────────────────
  proxy:
    image: nginx:alpine
    container_name: yatinveda-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - yatinveda-net

  # ──────────────────────────────────────────
  # Prometheus – Metrics collection
  # (docker compose --profile monitoring up)
  # ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: yatinveda-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - yatinveda-net

  # ──────────────────────────────────────────
  # Grafana – Metrics dashboards
  # ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: yatinveda-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafanapass}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - yatinveda-net

  # ──────────────────────────────────────────
  # Blackbox Exporter – Synthetic HTTP probes
  # ──────────────────────────────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: yatinveda-blackbox
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./monitoring/blackbox.yml:/config/blackbox.yml:ro
    command: --config.file=/config/blackbox.yml
    ports:
      - "9115:9115"
    networks:
      - yatinveda-net

# ──────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  nginx_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ──────────────────────────────────────────
# Networks
# ──────────────────────────────────────────
networks:
  yatinveda-net:
    name: yatinveda-network
    driver: bridge
