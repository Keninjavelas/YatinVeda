[pytest]
filterwarnings =
    # Pydantic v2 migration warnings from our use of v1-style APIs
    ignore::pydantic.PydanticDeprecatedSince20
    # Starlette deprecation for HTTP_422_UNPROCESSABLE_ENTITY constant (external)
    ignore:'HTTP_422_UNPROCESSABLE_ENTITY' is deprecated:DeprecationWarning
    # General DeprecationWarnings from third-party libs during tests
    ignore::DeprecationWarning

asyncio_default_fixture_loop_scope = function
